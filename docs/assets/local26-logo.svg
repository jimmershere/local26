<svg xmlns="http://www.w3.org/2000/svg" width="720" height="720" viewBox="0 0 720 720" role="img" aria-labelledby="title desc">
  <title id="title">Local-26 operators union seal</title>
  <desc id="desc">A faux union seal for the Local-26 operator CLI, with a terminal cursor, crossed wrench and key, and the words plan deploy audit.</desc>
  <defs>
    <style>
      .field { fill: #111827; }
      .ring { fill: #d6a23a; }
      .paper { fill: #f7efe1; }
      .ink { fill: #111827; font-family: "Courier New", monospace; font-weight: 800; letter-spacing: 4px; }
      .small { fill: #111827; font-family: "Courier New", monospace; font-weight: 700; letter-spacing: 2px; }
      .line { stroke: #111827; stroke-width: 18; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .gold-line { stroke: #d6a23a; stroke-width: 12; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    </style>
  </defs>
  <circle class="field" cx="360" cy="360" r="342"/>
  <circle class="ring" cx="360" cy="360" r="318"/>
  <circle class="field" cx="360" cy="360" r="278"/>
  <circle class="paper" cx="360" cy="360" r="226"/>
  <path class="gold-line" d="M210 360h92m116 0h92"/>
  <path class="line" d="M250 442l106-164 114 164"/>
  <path class="line" d="M296 442h128"/>
  <path class="line" d="M244 272l92 92"/>
  <path class="line" d="M476 272l-92 92"/>
  <path class="line" d="M238 270h56"/>
  <path class="line" d="M482 270h-56"/>
  <text class="ink" x="360" y="130" font-size="58" text-anchor="middle">LOCAL-26</text>
  <text class="small" x="360" y="610" font-size="30" text-anchor="middle">PLAN • DEPLOY • AUDIT</text>
  <text class="small" x="360" y="662" font-size="24" text-anchor="middle">OPERATORS HOLD THE LINE</text>
  <text class="ink" x="360" y="396" font-size="66" text-anchor="middle">&gt;_</text>
</svg>
