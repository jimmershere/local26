name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "hardening/**"

permissions:
  contents: read

jobs:
  baseline:
    name: Baseline tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run compile + baseline shell regression suite
        run: make test

      - name: Run Python test suite
        run: make python-test

      - name: Run quality and security gates
        run: make quality
