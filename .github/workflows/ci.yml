name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "hardening/**"

permissions:
  contents: read

jobs:
  baseline:
    name: Baseline tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Run quality and security gates
        run: make quality

      - name: Run baseline shell regression suite
        run: make shell-test
