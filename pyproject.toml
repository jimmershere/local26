[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "local26"
version = "0.1.0"
description = "Local-26 Python control plane"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "PyYAML>=6.0",
  "textual>=8.2.5",
]

[project.scripts]
local26 = "local26.cli:main"

[project.optional-dependencies]
dev = ["pytest>=8"]
