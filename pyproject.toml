[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "seraf"
version = "0.1.0"
description = "Seraf Python control plane"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "PyYAML>=6.0",
  "textual>=8.2.5",
]

[project.scripts]
seraf = "seraf.cli:main"

[project.optional-dependencies]
dev = ["pytest>=8"]
