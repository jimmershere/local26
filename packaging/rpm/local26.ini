[local26]
version = 0.1
project = local26
default_scope = main
state_dir = .local26/state
plans_dir = .local26/plans
runs_dir = .local26/runs
logs_dir = .local26/logs
lock_file = .local26/local26.lock
require_plan_for_deploy = true
fail_fast = true
max_parallel = 4
shell = /usr/bin/bash

[tools]
ssh = /usr/bin/ssh
rsync = /usr/bin/rsync
find = /usr/bin/find

[defaults]
rsync_opts = -az
backup = true
backup_suffix = .bkp
remote_mkdir = true
dry_run_default = false
log_hosts =
log_dest_dir = .local26/pulled-logs
jboss_log_path =
apache_log_path =
engin_log_path =
smartxfr_log_path =

[routing]
env_from_filename_prefix = s:sys,q:qa,p:production
env_from_server_name_char_at = 4
env_from_server_name_char_map = s:sys,q:qa,p:production

[access]
allowed_users =
allowed_groups =
denied_users =
deny_root = false
allow_remote_cmd = false

# Add one or more scope sections, for example:
