# Legacy SERAF settings for M2 project.
# Built from hosts where server name matches *pal*/*palm2* in hosts.txt source list.
# NOTE: Update source_dir/target_dir to the real deployment paths before deploy.

[m2_project]
# Required by seraf init --import.
source_dir = /srv/m2/release
target_dir = /srv/m2/deploy

# Full M2 scope: includes all *palm2* hosts from the hosts source list,
# including any entries flagged with trailing "x" in that list.
servers = a70lppalm2ex001,a70lppalm2ex002,a70lppalm2ex003,a70lppalm2in001,a70lppalm2in002,a70lppalm2tr001,a70lppalm2tr002,a70lppalm2tr003,a70lppalm2tr004,a70lppalm2tr005,a70lppalm2tr006,a70lppalm2or001,a70lppalm2or002,a70lqpalm2ex001,a70lqpalm2ex002,a70lqpalm2ex003,a70lqpalm2in001,a70lqpalm2in002,a70lqpalm2tr001,a70lqpalm2tr002,a70lqpalm2or001,a70lspalm2ex001,a70lspalm2in001,a70lspalm2tr001,a70lspalm2or001

rsync_opts = -az --delete
backup = true
backup_suffix = .bkp
